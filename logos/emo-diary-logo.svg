<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <!-- 柔和的渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0F5;stop-opacity:1" /> <!-- 浅粉 -->
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" /> <!-- 浅蓝 -->
    </linearGradient>
    <!-- 星星人的光芒渐变 -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#FFFDE7;stop-opacity:1" /> <!-- 亮黄 -->
      <stop offset="100%" style="stop-color:#FFD54F;stop-opacity:0" /> <!-- 金黄，透明 -->
    </radialGradient>
    <!-- 可爱字体样式 -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
      .logo-text {
        font-family: 'Fredoka One', cursive;
        font-size: 48px;
        fill: #FF7043; /* 暖橙色 */
        filter: drop-shadow(2px 2px 0px #FFAB91); /* 文字阴影 */
      }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="20" ry="20" />

  <!-- 核心图形组合 -->
  <g transform="translate(50, 40)">
    <!-- 日记本 -->
    <g transform="rotate(-10)">
      <rect x="40" y="60" width="140" height="160" rx="10" ry="10" fill="#B39DDB" stroke="#9575CD" stroke-width="3" /> <!-- 紫色封面 -->
      <rect x="50" y="70" width="120" height="140" rx="5" ry="5" fill="#FFF" /> <!-- 白色内页 -->
      <!-- 日记本上的线条 -->
      <line x1="60" y1="90" x2="160" y2="90" stroke="#E1BEE7" stroke-width="2" stroke-linecap="round" />
      <line x1="60" y1="110" x2="160" y2="110" stroke="#E1BEE7" stroke-width="2" stroke-linecap="round" />
      <line x1="60" y1="130" x2="160" y2="130" stroke="#E1BEE7" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- 星星人 -->
    <g transform="translate(110, 100)">
      <!-- 光芒背景 -->
      <circle cx="0" cy="0" r="70" fill="url(#starGlow)" />
      <!-- 星星主体 (圆润的五角星) -->
      <path d="M 0,-50 C -5,-50 -15,-45 -18,-35 L -25,-15 L -45,-12 C -55,-10 -60,0 -55,8 L -40,25 L -43,45 C -45,55 -35,60 -25,55 L 0,45 L 25,55 C 35,60 45,55 43,45 L 40,25 L 55,8 C 60,0 55,-10 45,-12 L 25,-15 L 18,-35 C 15,-45 5,-50 0,-50 Z" fill="#FFD54F" stroke="#FFC107" stroke-width="3" stroke-linejoin="round" />
      <!-- 表情 -->
      <circle cx="-12" cy="-5" r="4" fill="#5D4037" /> <!-- 左眼 -->
      <circle cx="12" cy="-5" r="4" fill="#5D4037" /> <!-- 右眼 -->
      <path d="M -10,10 Q 0,18 10,10" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round" /> <!-- 微笑 -->
      <!-- 腮红 -->
      <ellipse cx="-18" cy="5" rx="5" ry="3" fill="#FFAB91" opacity="0.6" />
      <ellipse cx="18" cy="5" rx="5" ry="3" fill="#FFAB91" opacity="0.6" />
    </g>

    <!-- 装饰元素 (漂浮的爱心和星星) -->
    <g fill="#FF7043">
      <path d="M 180,50 Q 190,40 200,50 Q 210,60 200,70 Q 190,80 180,70 Q 170,80 160,70 Q 150,60 160,50 Q 170,40 180,50 Z" transform="scale(0.6)" /> <!-- 爱心 1 -->
      <path d="M 30,150 Q 40,140 50,150 Q 60,160 50,170 Q 40,180 30,170 Q 20,180 10,170 Q 0,160 10,150 Q 20,140 30,150 Z" transform="scale(0.4)" fill="#F06292" /> <!-- 爱心 2 -->
      <polygon points="220,180 225,195 240,195 228,205 233,220 220,210 207,220 212,205 200,195 215,195" fill="#FFD54F" transform="scale(0.5)" /> <!-- 小星星 -->
    </g>
  </g>

  <!-- 文字 -->
  <text x="200" y="260" text-anchor="middle" class="logo-text">情绪日记</text>
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9E9E9E" letter-spacing="2">EMO DIARY</text>
</svg>
